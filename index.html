<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Syne:wght@400..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="user-data">
        <h1>BMI Calculator</h1>
        <form>
            <div><label>Height in CM</label><input type="text" id="height"></div>
            <div><label>Weight in KG</label><input type="text" id="weight"></div>
            <button id="btn">Calculate</button>

            <div id="result"></div>
            </div>
            <div class="guide-box">
                <h2>BMI Weight Guide</h2>
                <p >Under Weight Less than = 18.5</p>
                <p >Healthy Weight = 18.5 - 24.9</p>
                <p >Over Weight = 25.0 - 29.9</p>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
</body>

</html>
